name: Release

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/cortex-persist/
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Verify tagged commit is reachable from main
        run: |
          git fetch origin main
          git branch -r --contains "${GITHUB_SHA}" | grep -q "origin/main"
      - run: pip install build twine
      - run: python scripts/release_preflight.py --tag "${GITHUB_REF_NAME}"
      - name: Smoke test built wheel
        run: |
          python -m venv .release-smoke
          . .release-smoke/bin/activate
          pip install dist/*.whl
          python - <<'PY'
          from cortex_persist import CortexClient, CortexEngine, __version__

          assert CortexClient.__name__ == "CortexClient"
          assert CortexEngine.__name__ == "CortexEngine"
          print(f"smoke-import-ok:{__version__}")
          PY

      - name: Generate build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'dist/*'

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.3.0  # signing — keep tag for compat
        with:
          inputs: dist/*

      - name: Upload signed artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: signed-dist
          path: |
            dist/*
            dist/*.sigstore.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            dist/*.sigstore.json
          generate_release_notes: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1  # trusted publisher — keep tag
