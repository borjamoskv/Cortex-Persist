name: Optimizations

on:
  push:
    branches: [main]
    paths:
      - "cortex/**"
      - "benchmarks/**"
      - "tests/**"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - "cortex/**"
      - "benchmarks/**"
      - "tests/**"
      - "pyproject.toml"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  change-scope:
    uses: ./.github/workflows/reusable-change-scope.yml

  benchmarks:
    needs: [change-scope]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache ruff
        uses: actions/cache@v4
        with:
          path: .ruff_cache
          key: ${{ runner.os }}-ruff-${{ hashFiles('**/.ruff_cache') }}

      - name: Install dependencies
        if: needs.change-scope.outputs.release_only != 'true'
        run: pip install -e ".[dev]"

      - name: Release-only smoke
        if: needs.change-scope.outputs.release_only == 'true'
        run: python scripts/repo_health_changed.py

      - name: Run quick benchmarks
        if: needs.change-scope.outputs.release_only != 'true'
        run: python benchmarks/bench_repo.py --quick
