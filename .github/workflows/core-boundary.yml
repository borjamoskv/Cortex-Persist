name: core-boundary

on:
  pull_request:
  push:
    branches: [main]

jobs:
  enforce-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check core boundary
        run: python scripts/check_core_boundary.py
