name: JS SDK Readiness

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Build and pack JS SDK
        working-directory: sdks/js
        run: |
          npm ci
          npm run build
          npm pack
      - name: Upload JS SDK tarball
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: js-sdk-tarball
          path: sdks/js/*.tgz
