name: repo-inventory

on:
  push:
    branches: [main]
  pull_request:

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate inventory
        run: python scripts/repo_inventory.py
      - uses: actions/upload-artifact@v4
        with:
          name: repo-inventory
          path: artifacts/
