name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  change-scope:
    name: change-scope
    runs-on: ubuntu-latest
    outputs:
      automation_only: ${{ steps.scope.outputs.automation_only }}
      sigint_related: ${{ steps.scope.outputs.sigint_related }}
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
        with:
          fetch-depth: 0
      - id: scope
        shell: bash
        run: |
          set -euo pipefail

          zero_sha="0000000000000000000000000000000000000000"
          event_name="${{ github.event_name }}"
          diff_range=""

          if [[ "$event_name" == "pull_request" ]]; then
            git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
            diff_range="origin/${{ github.base_ref }}...HEAD"
          elif [[ "$event_name" == "push" && "${{ github.event.before }}" != "$zero_sha" ]]; then
            diff_range="${{ github.event.before }}...HEAD"
          fi

          if [[ -z "$diff_range" ]]; then
            echo "automation_only=false" >> "$GITHUB_OUTPUT"
            echo "sigint_related=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$diff_range")
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "automation_only=false" >> "$GITHUB_OUTPUT"
            echo "sigint_related=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          automation_only=true
          sigint_related=false

          for file in "${files[@]}"; do
            case "$file" in
              .github/workflows/ci.yml|\
              .github/workflows/quality_gates.yml|\
              .github/workflows/repo-health-lite.yml|\
              .github/workflows/sigint-monitor.yml|\
              .github/workflows/sovereign-deploy.yml|\
              scripts/repo_health_changed.py|\
              cortex/extensions/moltbook/sigint.py)
                ;;
              *)
                automation_only=false
                ;;
            esac

            case "$file" in
              .github/workflows/sigint-monitor.yml|cortex/extensions/moltbook/sigint.py)
                sigint_related=true
                ;;
            esac
          done

          echo "automation_only=$automation_only" >> "$GITHUB_OUTPUT"
          echo "sigint_related=$sigint_related" >> "$GITHUB_OUTPUT"

  lint:
    needs: [change-scope]
    if: needs.change-scope.outputs.automation_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install -e ".[dev,api]"
          pip install ruff
      - name: Ruff lint
        run: ruff check cortex/ tests/
      - name: Ruff format check
        run: ruff format --check cortex/ tests/

  security:
    needs: [change-scope]
    if: needs.change-scope.outputs.automation_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev,api]"
      - name: Install security tools
        run: pip install pip-audit bandit ruff
      - name: Audit dependencies for known CVEs
        run: pip-audit . --desc on --ignore-vuln GHSA-qmgc-5h2g-mvrw --ignore-vuln GHSA-j842-xgm4-wf88 --ignore-vuln GHSA-w6vg-jg77-2qg6 --ignore-vuln GHSA-f83h-ghpp-7wcc --ignore-vuln GHSA-jr27-m4p2-rc6r
      - name: Ruff SAST scan (S-select)
        run: ruff check cortex/ --select S --output-format json -o bandit-report.json
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: bandit-report
          path: bandit-report.json
      - name: SBOM generation
        uses: anchore/sbom-action@61119d458adab75f756bc0b9e4bde25725f86a7a # v0
        with:
          format: cyclonedx-json
          output-file: sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: sbom
          path: sbom.json

  test:
    needs: [change-scope]
    if: needs.change-scope.outputs.automation_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    env:
      CORTEX_TEST_MODE: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONFAULTHANDLER: "1"
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -e ".[dev,api]"
      - name: Show test environment
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-artifacts
          python --version
          python -m pytest --version
          pip freeze | sort | grep -E '^(coverage|pytest|pytest-asyncio|pytest-cov|pytest-timeout)=' || true
          python -m pytest --trace-config -q > test-artifacts/pytest-trace-config.txt 2>&1 || true
      - name: Collect tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-artifacts
          python -m pytest tests/ --collect-only -q 2>&1 | tee test-artifacts/collect.log
      - name: Run tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-artifacts
          status=0
          timeout --signal=TERM 20m \
          python -X faulthandler -m pytest tests/ -vv -s --tb=short -x \
            --durations=20 \
            --timeout=300 \
            --timeout-method=thread \
            --junitxml=test-artifacts/pytest.xml \
            -o faulthandler_timeout=300 \
            --cov=cortex \
            --cov-report=xml \
            --cov-report=term-missing \
            2>&1 | tee test-artifacts/pytest.log || status=${PIPESTATUS[0]}
          if [ "${status}" -ne 0 ]; then
            echo "pytest exit code: ${status}"
            ps -ef || true
            pstree -ap || true
            exit "${status}"
          fi
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: test-diagnostics-py${{ matrix.python-version }}
          if-no-files-found: warn
          path: |
            test-artifacts/
            coverage.xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  build:
    needs: [change-scope, lint, security, test]
    if: needs.change-scope.outputs.automation_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Build package
        run: |
          pip install build
          python -m build
      - name: Upload artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: dist
          path: dist/

  docker:
    needs: [change-scope, test]
    if: needs.change-scope.outputs.automation_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - name: Build Docker image
        run: docker build -t cortex:test .
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9a1457 # v0.28.0
        with:
          image-ref: cortex:test
          exit-code: 1
          severity: CRITICAL,HIGH
          format: table
      - name: Smoke test
        run: |
          docker run --rm -d --name cortex-test -p 8484:8484 cortex:test
          sleep 5
          curl -f http://localhost:8484/health || exit 1
          docker stop cortex-test
