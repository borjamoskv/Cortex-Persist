name: C5-REAL Live Telemetry

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-telemetry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'
          
      - name: Install Dependencies
        run: |
          pip install psutil
          
      - name: Generate Telemetry SVG
        run: |
          mkdir -p assets/marketing
          python scripts/generate_telemetry.py
          
      - name: Commit and Push to telemetry branch
        run: |
          git config --global user.name "CORTEX-Daemon[bot]"
          git config --global user.email "cortex-daemon@users.noreply.github.com"
          mv assets/marketing/telemetry.svg /tmp/telemetry.svg
          git fetch origin telemetry || true
          git checkout telemetry || git checkout --orphan telemetry
          mkdir -p assets/marketing
          mv /tmp/telemetry.svg assets/marketing/telemetry.svg
          git add assets/marketing/telemetry.svg
          git commit -m "chore(telemetry): update C5-REAL execution metrics [skip ci]" || exit 0
          git push origin telemetry
