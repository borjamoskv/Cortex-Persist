name: C5-REAL Formal Verification Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  verify:
    name: Full Spectrum Verification
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: 1. Compilación del Kernel (Rust)
      run: |
        rustc babylon60.rs -o b60_kernel
        chmod +x b60_kernel

    - name: 2. Hito C - Suite de Conformidad (Differential/Isomorphic Trace)
      run: |
        python3 conformity_suite.py

    - name: 3. Hito D - Property Testing & Determinism Fuzzing
      run: |
        python3 fuzz_b60.py --iterations 250

    - name: 4. Validación de Semántica y Graph Hashes
      run: |
        # Assert the artifact bundle generation
        if [ ! -f "artifact_bundle_v3/graph.canonical" ]; then
          echo "Error: Canonical graph not exported!"
          exit 1
        fi
        if [ ! -f "artifact_bundle_v3/proof.ir" ]; then
          echo "Error: Proof IR not exported!"
          exit 1
        fi
        echo "C5-REAL: Graph and Proof IR successfully validated."
