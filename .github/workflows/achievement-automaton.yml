# ─────────────────────────────────────────────────────────────────────
# CORTEX Achievement Automaton v2
# ─────────────────────────────────────────────────────────────────────
# Two modes:
#   1. PASSIVE: Any push to a non-main branch → auto-creates PR → merges
#   2. ACTIVE:  Scheduled daily — generates synthetic commits → PRs → merges
#
# Farms: 🦈 Pull Shark · 📦 Pair Extraordinaire · 🎯 YOLO
# ─────────────────────────────────────────────────────────────────────

name: "⚡ Achievement Automaton"

on:
  # Mode 1: Passive — triggers on real work
  push:
    branches-ignore:
      - main
      - master

  # Mode 2: Active — daily scheduled farming (3 PRs/day)
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC
    - cron: "0 14 * * *"  # 14:00 UTC
    - cron: "0 20 * * *"  # 20:00 UTC

  # Manual trigger for instant farming
  workflow_dispatch:
    inputs:
      count:
        description: "Number of PRs to farm"
        default: "1"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  # ─── Mode 1: Real branch push → auto PR + merge ───
  passive-farm:
    name: "🦈 Passive Farm"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.actor == 'borjamoskv'

    steps:
      - name: Create and merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          echo "🦈 Creating PR for branch: ${BRANCH}"

          # Create PR via gh CLI
          PR_URL=$(gh pr create \
            --repo "${{ github.repository }}" \
            --head "${BRANCH}" \
            --base "main" \
            --title "⚡ ${BRANCH} → main" \
            --body "### Achievement Automaton
          **Branch**: \`${BRANCH}\`
          **Commit**: \`${{ github.sha }}\`
          _🦈 Pull Shark +1_" \
            2>&1) || true

          echo "PR: ${PR_URL}"

          # Merge it
          if echo "${PR_URL}" | grep -q "github.com"; then
            gh pr merge "${PR_URL}" \
              --squash \
              --delete-branch \
              --admin \
              || gh pr merge "${PR_URL}" --squash --delete-branch || true
          fi

          echo "✅ 🦈 +1"

  # ─── Mode 2: Scheduled synthetic farming ───
  active-farm:
    name: "🦈 Active Farm"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure git
        run: |
          git config user.name "borjamoskv"
          git config user.email "borjamoskv@users.noreply.github.com"

      - name: Farm PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT="${{ github.event.inputs.count || '1' }}"
          echo "🦈 Farming ${COUNT} PR(s)..."

          for i in $(seq 1 ${COUNT}); do
            BRANCH="farm/shark-$(date +%Y%m%d-%H%M%S)-${i}"
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            # Create branch with a real change
            git checkout -b "${BRANCH}"
            echo "# 🦈 ${TIMESTAMP}" >> .github/.achievement-log
            git add .github/.achievement-log
            git commit -m "chore: achievement ${TIMESTAMP}

          Co-authored-by: CORTEX <cortex@moskv.dev>"

            git push origin "${BRANCH}"

            # Create PR
            PR_URL=$(gh pr create \
              --head "${BRANCH}" \
              --base "main" \
              --title "⚡ shark ${TIMESTAMP}" \
              --body "_🦈 Automated by CORTEX Achievement Automaton_")

            # Merge immediately
            gh pr merge "${PR_URL}" \
              --squash \
              --delete-branch \
              --admin \
              || gh pr merge "${PR_URL}" --squash --delete-branch || true

            echo "✅ PR #${i} merged"

            # Reset to main for next iteration
            git checkout main
            git pull origin main

            sleep 2
          done

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚡ FARMED ${COUNT} PR(s)"
          echo "🦈 Pull Shark: +${COUNT}"
          echo "📦 Pair Extraordinaire: +${COUNT}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
