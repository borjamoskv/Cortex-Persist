name: Sovereign Deploy FSM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: sovereign-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TF_VERSION: "1.7.5"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  fsm-deploy:
    name: "Determinismo C5-REAL: FSM Deploy Engine"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Dependencias
        run: |
          pip install -e ".[dev,api,mcp]" numpy
          pip install ruff bandit safety mypy build twine click

      - name: Ignición FSM Deploy Engine
        run: python -m babylon60.cli deploy run-fsm
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_ACR_REGISTRY: ${{ secrets.AZURE_ACR_REGISTRY }}
          AZURE_ACR_USER: ${{ secrets.AZURE_ACR_USER }}
          AZURE_ACR_PASSWORD: ${{ secrets.AZURE_ACR_PASSWORD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AWS_ENDPOINT: ${{ secrets.AWS_ENDPOINT }}
          GCP_ENDPOINT: ${{ secrets.GCP_ENDPOINT }}
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
