# Codecov configuration for Cortex-Persist
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  precision: 2
  round: down
  range: "95...100"

  status:
    project:
      default:
        target: 100%
        threshold: 0%
        if_ci_failed: error

    patch:
      default:
        target: 100%
        threshold: 0%
        if_ci_failed: error

ignore:
  - "tests/**"
  - "scripts/**"
  - "docs/**"
  - "benchmarks/**"
  - "examples/**"
  - "experimental/**"
  - "**/__pycache__/**"
  - "**/conftest.py"
  - "setup.py"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
