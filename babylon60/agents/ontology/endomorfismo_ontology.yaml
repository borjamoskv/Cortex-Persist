  Métrica Falsable: Physical_Paths_In_Response == 0`.
- ID: ENDO-I90
  Invariante: INV_MONITOR_RUN
  Lógica / Principio: El daemon de watchdog se ejecuta como proceso independiente
    del host.
  Implicación Operacional: Garantiza monitorización persistente e inmune a fallas
    de API.
  Condición de Borde: Watchdog script check.
  Métrica Falsable: Watchdog_PID_Active == True`.
- ID: ENDO-I91
  Invariante: INV_CACHE_REDIS
  Lógica / Principio: El almacenamiento Redis L1 cache tiene TTL máximo de 300 segundos.
  Implicación Operacional: Previene consistencia degradada por caché obsoleta prolongada.
  Condición de Borde: Redis client instantiation.
  Métrica Falsable: Default_TTL <= 300` segundos.
- ID: ENDO-I92
  Invariante: INV_HOST_WHITE
  Lógica / Principio: El proxy local del morfismo sólo enruta peticiones a dominios
    de lista blanca.
  Implicación Operacional: Previene desvío de tráfico sensible a redes externas.
  Condición de Borde: API Gateway routing table.
  Métrica Falsable: Target_Domain in Whitelist`.
- ID: ENDO-I93
  Invariante: INV_ASYNC_POOL
  Lógica / Principio: El cliente httpx utiliza un único pool de conexiones cerrado.
  Implicación Operacional: Evita el consumo desmedido de descriptores de socket TCP.
  Condición de Borde: API gateway client helper.
  Métrica Falsable: Pool_Closed == True` on app exit.
- ID: ENDO-I94
  Invariante: INV_ASGI_TIMEOUT
  Lógica / Principio: Uvicorn timeout keep-alive está configurado a 15 segundos en
    local.
  Implicación Operacional: Minimiza retención de sockets inactivos.
  Condición de Borde: ASGI command run execution.
  Métrica Falsable: keep_alive_timeout == 15`.
- ID: ENDO-I95
  Invariante: INV_MIME_STRICT
  Lógica / Principio: El parser rechaza cualquier payload que no declare Content-Type
    válido.
  Implicación Operacional: Previene inyecciones de payloads deformados.
  Condición de Borde: API Gateway entry validation.
  Métrica Falsable: Header_Content_Type == Required`.
- ID: ENDO-I96
  Invariante: INV_SIGN_MT
  Lógica / Principio: Todo mensaje inter-agente incluye la firma digital Ed25519 del
    emisor.
  Implicación Operacional: Garantiza autenticidad y previene suplantación de nodos.
  Condición de Borde: Message serialization handler.
  Métrica Falsable: hasattr(Message, "Signature")`.
- ID: ENDO-I97
  Invariante: INV_MIG_LEDGER
  Lógica / Principio: Las migraciones de esquema emiten un evento criptográfico al
    Ledger.
  Implicación Operacional: Registra la trazabilidad del cambio de estructura.
  Condición de Borde: Database migration execution.
  Métrica Falsable: Ledger_Event_Logged == True`.
- ID: ENDO-I98
  Invariante: INV_INVAR_FILE
  Lógica / Principio: Los archivos de configuración invariantes se montan en modo
    lectura en el Docker/SO.
  Implicación Operacional: Previene modificaciones accidentales de directivas.
  Condición de Borde: Container execution configuration.
  Métrica Falsable: Mount_Mode == "read_only"`.
- ID: ENDO-I99
  Invariante: INV_VEC_STRICT
  Lógica / Principio: SQLite-Vec exige concordancia de dimensiones del vector en cada
    query.
  Implicación Operacional: Evita fallas catastróficas de comparación.
  Condición de Borde: SQLite query build.
  Métrica Falsable: Query_Vector_Dimension == DB_Dim`.
- ID: ENDO-I100
  Invariante: INV_LAZY_CLEAN
  Lógica / Principio: Las colas de tareas lazy se purgan por completo al detener el
    worker.
  Implicación Operacional: Previene persistencia de tareas huérfanas en el reinicio.
  Condición de Borde: Shutdown lifecycle hook.
  Métrica Falsable: Lazy_Queue_Depth == 0` on stop.
M3_ANTIPATTERNS:
- ID: ENDO-AP01
  Antipatrón: Circular Dependency Loop
  Disfunción Causal: Composición de endomorfismos cíclicos sin control de corte (Circuit
    Breaker).
  Señal de Presencia: Recursión infinita en logs sin yields.
  Impacto en Robustez: Desborde de pila (StackOverflow) y OOM.
  Refactor (Alternativa): Implementar contador Max-Hops y apoptosis.
- ID: ENDO-AP02
  Antipatrón: Anergy Prose Gate
  Disfunción Causal: Intentar describir el morfismo de transformación en prosa dentro
    del loop.
  Señal de Presencia: Tokens de explicación en base de datos.
  Impacto en Robustez: Desperdicio de tokens y degradación de exergía.
  Refactor (Alternativa): Epistemic-Purge-OMEGA y colapso directo a Hash.
- ID: ENDO-AP03
  Antipatrón: Unsigned Hot Patching
  Disfunción Causal: Mutar el estado interno saltándose el Write-Path Contract y la
    firma Taint.
  Señal de Presencia: Registros SQLite sin metadatos de taint.
  Impacto en Robustez: Pérdida de proveniencia y auditoría rota.
  Refactor (Alternativa): Forzar `CORTEX-TAINT` en cada INSERT/UPDATE.
- ID: ENDO-AP04
  Antipatrón: Wildcard CORS Route
  Disfunción Causal: Levantar la API local del morfismo con políticas CORS abiertas
    (`*`).
  Señal de Presencia: Asterisco visible en la configuración de CORS.
  Impacto en Robustez: Exfiltración de estados a través de XSS.
  Refactor (Alternativa): Restringir CORS estrictamente a localhost.
- ID: ENDO-AP05
  Antipatrón: Mixed Socket Context
  Disfunción Causal: Compartir el mismo puerto de red para flujos TLS y flujos en
    texto plano.
  Señal de Presencia: Ausencia de canal TLS forzado en el endpoint.
  Impacto en Robustez: Intercepción de estados sensibles (MitM).
  Refactor (Alternativa): Forzar puertos y certificados segregados.
- ID: ENDO-AP06
  Antipatrón: Nostalgic Sync Blocking
  Disfunción Causal: Usar llamadas I/O síncronas (`time.sleep`) en loops recursivos
    asíncronos.
  Señal de Presencia: def` en rutas ordinarias en lugar de `async def`.
  Impacto en Robustez: Congelamiento completo de la API del Gateway.
  Refactor (Alternativa): Refactorizar a corrutinas asíncronas nativas.
- ID: ENDO-AP07
  Antipatrón: Parametric Hallucination
  Disfunción Causal: Confiar en la memoria implícita del modelo para transiciones
    sin verificar en disco.
  Señal de Presencia: Morfismo generado sin fuentes locales.
  Impacto en Robustez: Desviación de lógica y código malicioso.
  Refactor (Alternativa): Ley de Proveniencia Obligatoria (AX-041).
- ID: ENDO-AP08
  Antipatrón: Loose Identity Morp
  Disfunción Causal: Asumir que la identidad `1_X` no necesita validación explícita.
  Señal de Presencia: Mutación accidental de estado en bootstrap.
  Impacto en Robustez: Estado inicial corrompido en frío.
  Refactor (Alternativa): Validar identidad con test unitario en inicio.
- ID: ENDO-AP09
  Antipatrón: Vector Dimension Mix
  Disfunción Causal: Mezclar vectores de embeddings de diferentes modelos en la tabla
    vec0.
  Señal de Presencia: Fallas de distancia de coseno en SQLite-Vec.
  Impacto en Robustez: Búsqueda semántica rota o degradada.
  Refactor (Alternativa): Separar tablas virtuales por modelo de embedding.
- ID: ENDO-AP10
  Antipatrón: Untracked DB Migrat
  Disfunción Causal: Modificar esquemas de SQLite sin registrar scripts de migración.
  Señal de Presencia: Base de datos malformada en CI.
  Impacto en Robustez: Ruptura de consistencia en despliegues.
  Refactor (Alternativa): migrar vía `migrate.py` y registrar en git.
- ID: ENDO-AP11
  Antipatrón: Ghost Working Tree
  Disfunción Causal: Dejar archivos temporales sin registrar en git en el directorio
    del loop.
  Señal de Presencia: Working tree sucio en CI.
  Impacto en Robustez: Loops de commit infinitos en pre-commit.
  Refactor (Alternativa): Excluir temporales en `.git/info/exclude`.
- ID: ENDO-AP12
  Antipatrón: Plaintext Key Storage
  Disfunción Causal: Almacenar claves de cifrado en variables del entorno o JSON de
    config.
  Señal de Presencia: Claves legibles en repositorios.
  Impacto en Robustez: Compromiso total del cifrado de estados.
  Refactor (Alternativa): Integrar llavero del sistema operativo (Keyring).
- ID: ENDO-AP13
  Antipatrón: Unbounded Task Queue
  Disfunción Causal: Acumular tareas perezosas en el event loop sin límite de encolamiento.
  Señal de Presencia: Crecimiento incontrolado de memoria RAM.
  Impacto en Robustez: Caída del Gateway por OOM.
  Refactor (Alternativa): Forzar resolución ansiosa y paginado.
- ID: ENDO-AP14
  Antipatrón: Bare Exceptions Catch
  Disfunción Causal: Capturar excepciones genéricas (`except Exception:`) en core
    paths.
  Señal de Presencia: Silenciamiento de bugs críticos.
  Impacto en Robustez: Corrupción silenciosa del Ledger.
  Refactor (Alternativa): Capturar excepciones específicas.
- ID: ENDO-AP15
  Antipatrón: Dynamic Route Eval
  Disfunción Causal: Ejecutar código de ruteo dinámico sin validación criptográfica
    previa.
  Señal de Presencia: Inserción directa de rutas desde payloads JSON.
  Impacto en Robustez: Secuestro de tráfico por workers maliciosos.
  Refactor (Alternativa): Tabla de ruteo inmutable y firmada.
- ID: ENDO-AP16
  Antipatrón: Stack Exposure Err
  Disfunción Causal: Retornar stack traces legibles en el JSON de respuesta HTTP de
    error.
  Señal de Presencia: Stack trace en responses HTTP 500.
  Impacto en Robustez: Fugas de directorios y vulnerabilidades físicas.
  Refactor (Alternativa): Middleware limpio de excepciones.
- ID: ENDO-AP17
  Antipatrón: Zombie Sockets Host
  Disfunción Causal: Cerrar el proceso principal del morfismo sin liberar los sockets
    locales.
  Señal de Presencia: Address already in use error en bootstrap.
  Impacto en Robustez: Imposibilidad de reiniciar el Gateway.
  Refactor (Alternativa): Shutdown hooks de cierre ordenado.
- ID: ENDO-AP18
  Antipatrón: Cold Cache Read
  Disfunción Causal: Leer el estado del morfismo desde caché L1 fría sin invalidación
    activa.
  Señal de Presencia: Datos obsoletos leídos por subagente.
  Impacto en Robustez: Divergencia de estado lógica.
  Refactor (Alternativa): Invalidador síncrono post-persist.
- ID: ENDO-AP19
  Antipatrón: DNS Poison Tunnel
  Disfunción Causal: Configurar el proxy local para que acepte cualquier cabecera
    Host.
  Señal de Presencia: Peticiones locales redirigidas a internet.
  Impacto en Robustez: Fuga de estados locales a atacantes.
  Refactor (Alternativa): Middleware de Host de lista blanca.
- ID: ENDO-AP20
  Antipatrón: Mime Type Ignorance
  Disfunción Causal: Ignorar la validación de cabecera Content-Type en peticiones
    HTTP entrantes.
  Señal de Presencia: FastAPI retorna error 415.
  Impacto en Robustez: Rupturas de parser y excepciones no capturadas.
  Refactor (Alternativa): Validar Content-Type obligatoriamente.
M4_REDUNDANCIAS:
- ID: ENDO-RA01
  Redundancia C5: BFT Consensus Swarm
  Función Topológica: Quórum de N=3 validadores para firmar transiciones de estado
    del morfismo.
  Riesgo Mitigado: Fallos bizantinos de workers locales.
  Coste (Overhead): 3x tiempo de procesamiento.
  Dependencias: cortex/consensus/
- ID: ENDO-RA02
  Redundancia C5: Dual Reverse Proxy
  Función Topológica: Servidores de balanceo locales (Nginx/Uvicorn) en redundancia
    activa.
  Riesgo Mitigado: Caída o bloqueo del event loop ASGI.
  Coste (Overhead): Consumo mínimo de memoria.
  Dependencias: Nginx local.
- ID: ENDO-RA03
  Redundancia C5: Git Sentinel Ledger
  Función Topológica: Vinculación del Ledger con el historial inmutable del repositorio
    Git (DAG).
  Riesgo Mitigado: Alteración de base de datos offline.
  Coste (Overhead): Mínimo en cada commit.
  Dependencias: Git CLI.
- ID: ENDO-RA04
  Redundancia C5: Volatile Sandbox
  Función Topológica: Creación y destrucción de sandboxes de ejecución para JIT compilaciones.
  Riesgo Mitigado: Escalada de privilegios y compromisos.
  Coste (Overhead): Tiempo de bootstrap.
  Dependencias: Docker o jail local.
- ID: ENDO-RA05
  Redundancia C5: Fallback DNS Hosts
  Función Topológica: Resolución local estática de IPs en `/etc/hosts` de la máquina.
  Riesgo Mitigado: Caída del servidor de nombres externo.
  Coste (Overhead): Ninguno.
  Dependencias: Permisos de lectura.
- ID: ENDO-RA06
  Redundancia C5: Backup Gateway Node
  Función Topológica: Servidor local de fallback escuchando en puerto secundario.
  Riesgo Mitigado: Puerto principal bloqueado o Zombie.
  Coste (Overhead): Duplicidad de puertos.
  Dependencias: FastAPI local.
- ID: ENDO-RA07
  Redundancia C5: Epistemic Purge L1
  Función Topológica: Caché L1 con invalidación proactiva y limpieza de anergía en
    memoria.
  Riesgo Mitigado: Consistencia degradada por caché obsoleta.
  Coste (Overhead): Latencia de invalidador.
  Dependencias: Redis local.
- ID: ENDO-RA08
  Redundancia C5: Taint Signature Seal
  Función Topológica: Generación de SHA3-256 de payload integrado con metadatos de
    procedencia.
  Riesgo Mitigado: Mutaciones de estado anónimas.
  Coste (Overhead): Criptográfico por bloque.
  Dependencias: taint_engine.py
- ID: ENDO-RA09
  Redundancia C5: Keyring OS Escrow
  Función Topológica: Custodia de claves de cifrado en el llavero seguro del sistema
    operativo.
  Riesgo Mitigado: Robo de claves en disco duro local.
  Coste (Overhead): MS de llamada.
  Dependencias: API de Keyring.
- ID: ENDO-RA10
  Redundancia C5: compaction Backup
  Función Topológica: Clonación inmutable de la base de datos previa a la purga y
    compactación.
  Riesgo Mitigado: Corrupción catastrófica de SQLite.
  Coste (Overhead): Espacio en disco.
  Dependencias: aiosqlite utilities.
M5_VECTORS:
- ID: ENDO-AV01
  Vector Adversarial: Infinite Recursion Attack
  Superficie de Ataque: Stack del runtime local.
  Mecanismo de Explotación: Inyección de payload recursivo infinito ($f^n(x)$) sin
    yield asíncrono.
  Impacto Termodinámico: StackOverflow / Caída del proceso.
  Defensa (Mitigación): ENDO-I77` (Stack Yield) y Circuit Breaker.
- ID: ENDO-AV02
  Vector Adversarial: Taint Stripping Exploit
  Superficie de Ataque: Cabeceras de la API.
  Mecanismo de Explotación: Envío de peticiones de mutación eliminando o alterando
    el taint.
  Impacto Termodinámico: Corrupción del Ledger sin rastros.
  Defensa (Mitigación): Bloqueo estricto Write-Path (SAGA-2).
- ID: ENDO-AV03
  Vector Adversarial: Identity Spoofing
  Superficie de Ataque: Identidad del monoide.
  Mecanismo de Explotación: Modificación del morfismo identidad $1_X$ para redirigir
    transiciones.
  Impacto Termodinámico: Ruptura de consistencia en frío.
  Defensa (Mitigación): Validar identidad antes de operar.
- ID: ENDO-AV04
  Vector Adversarial: Parameter Fuzzing
  Superficie de Ataque: Endpoints de FastAPI.
  Mecanismo de Explotación: Envío masivo de payloads JSON deformados para romper el
    tipado.
  Impacto Termodinámico: Exposición de stack trace (500).
  Defensa (Mitigación): Tipado estricto Pydantic y try-catch.
- ID: ENDO-AV05
  Vector Adversarial: Origin Hijack CORS
  Superficie de Ataque: Cabecera Origin HTTP.
  Mecanismo de Explotación: Simulación de origen permitido desde navegadores externos
    atacantes.
  Impacto Termodinámico: Ejecución de transiciones cruzadas.
  Defensa (Mitigación): CORS restrictivo acotado a localhost.
- ID: ENDO-AV06
  Vector Adversarial: Slowloris Sockets
  Superficie de Ataque: Servidor ASGI Uvicorn.
  Mecanismo de Explotación: Mantener conexiones HTTP abiertas indefinidamente con
    bytes lentos.
  Impacto Termodinámico: Agotamiento de descriptores de red.
  Defensa (Mitigación): Timeout de keep-alive estricto en Uvicorn.
- ID: ENDO-AV07
  Vector Adversarial: Topology Flood
  Superficie de Ataque: Grafo de ruteo del Swarm.
  Mecanismo de Explotación: Enviar miles de cambios de topología falsificados.
  Impacto Termodinámico: Colapso de tablas de ruteo locales.
  Defensa (Mitigación): Firmas BFT requeridas en topology checks.
- ID: ENDO-AV08
  Vector Adversarial: Replay Token Attack
  Superficie de Ataque: Endpoint de autenticación.
  Mecanismo de Explotación: Reinyectar token firmado capturado dentro de la ventana
    de 5s.
  Impacto Termodinámico: Ejecución de transiciones no autorizadas.
  Defensa (Mitigación): Timestamp estricto y nonces únicos.
- ID: ENDO-AV09
  Vector Adversarial: Key Extraction Dump
  Superficie de Ataque: Memoria RAM del host.
  Mecanismo de Explotación: Volcado de memoria RAM para extraer llaves de cifrado
    en reposo.
  Impacto Termodinámico: Compromiso total del cifrado de estados.
  Defensa (Mitigación): Purgar claves tras uso en memoria.
- ID: ENDO-AV10
  Vector Adversarial: Environment Poisoning
  Superficie de Ataque: Variables de entorno del host.
  Mecanismo de Explotación: Inyectar variables de entorno falsas para desviar el proxy
    local.
  Impacto Termodinámico: Redirección de datos a servidor externo.
  Defensa (Mitigación): Cuarentena estricta de variables del host.
