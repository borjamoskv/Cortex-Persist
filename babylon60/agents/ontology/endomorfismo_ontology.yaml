M2_INVARIANTS:
- ID: ENDO-I01
  Invariante: INV_DIAGONALIZABILITY
  Lógica / Principio: Para ser diagonalizable, la multiplicidad algebraica de cada
    autovalor debe ser igual a su multiplicidad geométrica.
  Implicación Operacional: Descomposición espectral del estado en una base diagonal.
  Condición de Borde: Cálculo del polinomio característico.
  Métrica Falsable: AM(lambda) == GM(lambda)` para todo $\lambda$.
- ID: ENDO-I02
  Invariante: INV_IDENTITY_EXIST
  Lógica / Principio: Existe un único morfismo identidad $1_X$ neutral para la composición.
  Implicación Operacional: Inicialización limpia y restauración sin cambios de estado.
  Condición de Borde: Bootstrap del loop reflexivo.
  Métrica Falsable: f . 1_X == 1_X . f == f`.
- ID: ENDO-I03
  Invariante: INV_COMP_CLOSURE
  Lógica / Principio: La composición de endomorfismos genera obligatoriamente otro
    endomorfismo sobre el mismo objeto.
  Implicación Operacional: Previene la desalineación de esquemas en transformaciones
    en cascada.
  Condición de Borde: Enrutamiento de eventos inter-agentes.
  Métrica Falsable: f, g in End(X) -> f . g in End(X)`.
- ID: ENDO-I04
  Invariante: INV_COMP_ASSOC
  Lógica / Principio: La composición de endomorfismos es estrictamente asociativa.
  Implicación Operacional: El orden secuencial de agrupamiento no altera el resultado
    final.
  Condición de Borde: Invocación asíncrona concurrente.
  Métrica Falsable: (f . g) . h == f . (g . h)`.
- ID: ENDO-I05
  Invariante: INV_TAINT_FLOW
  Lógica / Principio: Toda transformación reflexiva propaga la cadena de firmas de
    procedencia.
  Implicación Operacional: Trazabilidad forense ininterrumpida de cambios de estado.
  Condición de Borde: Inserción en SQLite.
  Métrica Falsable: hasattr(State, "CORTEX-TAINT")`.
- ID: ENDO-I06
  Invariante: INV_LEDGER_CHAIN
  Lógica / Principio: Cada aplicación de un endomorfismo se firma y escribe en el
    Master Ledger.
  Implicación Operacional: Auditoría inmutable contra manipulaciones maliciosas.
  Condición de Borde: Fin de bloque en loop.
  Métrica Falsable: Ledger.verify() == True`.
- ID: ENDO-I07
  Invariante: INV_LANDAUER_HEAT
  Lógica / Principio: La poda o simplificación de información del estado disipa energía
    exérgica.
  Implicación Operacional: Límite físico en la retención indefinida de estados estocásticos.
  Condición de Borde: Compactación de base de datos.
  Métrica Falsable: Exergy_Cost >= k * T * ln(2)`.
- ID: ENDO-I08
  Invariante: INV_TENANT_BOUND
  Lógica / Principio: Un endomorfismo opera únicamente en el aislamiento del tenant_id
    origen.
  Implicación Operacional: Prohibición absoluta de accesos cruzados.
  Condición de Borde: API REST Request.
  Métrica Falsable: Tenant_ID_In == Tenant_ID_Out`.
- ID: ENDO-I09
  Invariante: INV_IMMUT_SCHEMAS
  Lógica / Principio: El esquema del objeto de estado es inmutable en caliente durante
    el ciclo.
  Implicación Operacional: Evita roturas del compilador AST en tiempo de ejecución.
  Condición de Borde: Inferencia estocástica activa.
  Métrica Falsable: Schema_Version == Constant`.
- ID: ENDO-I10
  Invariante: INV_MONOID_STRUCTURE
  Lógica / Principio: El conjunto de endomorfismos de un objeto $X$ forma un monoide
    bajo la composición.
  Implicación Operacional: Clausura y asociatividad forzada en los loops del Swarm.
  Condición de Borde: Bootstrap de transiciones.
  Métrica Falsable: f . (g . h) == (f . g) . h` y `f . 1_X == f`.
- ID: ENDO-I11
  Invariante: INV_ANERGY_ZERO
  Lógica / Principio: Las respuestas del loop de composición carecen de prosa o Green
    Theater.
  Implicación Operacional: Optimización extrema del consumo de tokens (Zero-Fluff).
  Condición de Borde: Output del agente en loop.
  Métrica Falsable: Prose_Tokens == 0`.
- ID: ENDO-I12
  Invariante: INV_BFT_CONSENSUS
  Lógica / Principio: Las transiciones críticas requieren quorum BFT verificado de
    N/3 nodos.
  Implicación Operacional: Protección contra fallos bizantinos de workers.
  Condición de Borde: Transición de estado P0.
  Métrica Falsable: Votes_Approved >= 2*t + 1`.
- ID: ENDO-I13
  Invariante: INV_SANDBOX_RUN
  Lógica / Principio: Todo código auto-generado por el loop se valida en sandbox aislado.
  Implicación Operacional: Evita escalada de privilegios y daños al host.
  Condición de Borde: Invocación de JIT compiler.
  Métrica Falsable: Sandbox_Violations == 0`.
- ID: ENDO-I14
  Invariante: INV_GIT_ALIGN
  Lógica / Principio: El grafo de estado en el Ledger está alineado con el historial
    de Git (AX-041).
  Implicación Operacional: Evita estados fantasmas fuera del control de versiones.
  Condición de Borde: Commit en sentinel.
  Métrica Falsable: Git_HEAD_Hash == Ledger_HEAD_Hash`.
- ID: ENDO-I15
  Invariante: INV_TEMP_BOUND
  Lógica / Principio: La temperatura del morfismo se acota a T=0.0 en mutaciones C5-REAL.
  Implicación Operacional: Garantiza determinismo lógico estricto.
  Condición de Borde: Mutación en base de datos.
  Métrica Falsable: Temperature == 0.0`.
- ID: ENDO-I16
  Invariante: INV_SHANNON_MIN
  Lógica / Principio: Las transformaciones de conocimiento preservan una entropía
    de Shannon mínima.
  Implicación Operacional: Evita degradación a texto plano redundante (slop).
  Condición de Borde: Inserción en Cortex Vault.
  Métrica Falsable: Shannon_Entropy >= 2.0` bits.
- ID: ENDO-I17
  Invariante: INV_WAL_LOCK
  Lógica / Principio: Toda escritura en la base de datos se realiza con lock exclusivo
    en modo WAL.
  Implicación Operacional: Previene bloqueos concurrentes y corrupción de SQLite.
  Condición de Borde: Escritura en SQLite.
  Métrica Falsable: Journal_Mode == "wal"`.
- ID: ENDO-I18
  Invariante: INV_COMP_BOUND
  Lógica / Principio: El número de morfismos en composición secuencial no excede el
    límite de pila.
  Implicación Operacional: Previene fallos de StackOverflow en el host.
  Condición de Borde: Ejecución del loop.
  Métrica Falsable: Stack_Depth <= 100`.
- ID: ENDO-I19
  Invariante: INV_KEY_ROTATION
  Lógica / Principio: Las claves de encriptación del estado se rotan cada 100 composiciones.
  Implicación Operacional: Minimiza el radio de blast de claves comprometidas.
  Condición de Borde: Fin de ciclo.
  Métrica Falsable: Key_Age_Blocks <= 100`.
- ID: ENDO-I20
  Invariante: INV_COMOD_LOCK
  Lógica / Principio: Toda lectura/escritura concurrente al estado del morfismo está
    protegida por Mutex.
  Implicación Operacional: Previene condiciones de carrera destructivas en variables.
  Condición de Borde: Acceso a variables de estado.
  Métrica Falsable: Mutex.is_locked == True` en write.
