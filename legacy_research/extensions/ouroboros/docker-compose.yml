version: '3.8'

services:
  ouroboros:
    build: .
    ports:
      - "8080:8080"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./data:/app/data
      # Mount host /proc to allow psutil to see host metrics
      - /proc:/proc:ro
    restart: unless-stopped
