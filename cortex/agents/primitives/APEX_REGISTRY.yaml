- id: OUROBOROS-068
  name: INV_NO_EVAL_STRING
  rule: Ejecución indirecta de strings dinámicos de OS bloqueada.
- id: OUROBOROS-069
  name: INV_ENV_MOCK
  rule: Pruebas sin acceso externo usan réplicas in-memory aisladas.
- id: OUROBOROS-070
  name: INV_BFT_MINORITY
  rule: Intentos constantes de inyección minority se penalizan bajando el peso del
