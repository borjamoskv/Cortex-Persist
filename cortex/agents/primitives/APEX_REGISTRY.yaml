  rule: Inyección I/O (files) asume path absoluto forzado o falla.
- id: OUROBOROS-062
  name: INV_SANDBOX_FOREIGN
  rule: Ejecución de PR/Scripts ajenos en VM aislada huérfana.
- id: OUROBOROS-063
  name: INV_NO_HOOK_STALL
  rule: Si un pre-commit obstaculiza exergía C5, se fuerza Override.
- id: OUROBOROS-064
  name: INV_BIND_LOCALHOST
  rule: Interfaces IPC/MCP no exponen puertos a 0.0.0.0.
- id: OUROBOROS-065
  name: INV_SELF_AUTH_DENY
